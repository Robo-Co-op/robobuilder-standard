# Robo Co-op company intelligence layer
# Skills read this file to apply correct branding, tools, and integrations
# without prompting the user every time.

org: Robo Co-op
git_org: Robo-Co-op              # official GitHub org (not jintkim-robo personal)
locale_default: en

# --- Communication ---
chat:
  platform: teams               # Microsoft Teams (not Slack)
  default_handoff_channel: ""   # TBD — fill with channel ID after install

# --- Documents ---
docs:
  notion_workspace: Robo Co-op
  notion_hub: https://www.notion.so/Claude-34e5a7e135d2807daec1d83e41d93504
  notion_bootcamp_root_page_id: "34e5a7e135d2807daec1d83e41d93504"

# --- Task tracking ---
task_tracker:
  platform: asana
  workspace: Robo Co-op

# --- Secrets management ---
secrets:
  manager: 1password
  cli: op                       # usage: op read "op://vault/item/credential"
  vaults:
    - Robo Co-op
    - Engineering

# --- Infrastructure ---
frontend_hosting: vercel
db:
  primary: supabase
  warehouse: azure-sql          # AZTK Mission Control backend
payments: stripe
serverless: azure-functions

# --- Brand colors (Brand Guidelines 2026 v2.0) ---
# Source: reference_brand_guidelines.md (Robo Co-op SharePoint)
# Master + 3 sub-brands. Sub-brand logos MUST use their primary color (no recolor).
brand_colors:
  robo_coop:          # master brand
    primary: "#8B3FFF"      # Infinity Purple
    primary_alt: "#6B2FCC"  # Deep Purple
    accent: "#B380FF"       # Lavender
    black: "#000000"
    white: "#FFFFFF"

  robo_lab:           # technology sub-brand (Pantone 2925 C)
    primary: "#007DD1"      # Primary Blue
    cyan: "#00C3FF"         # Electric Cyan
    sky: "#4DA3E0"          # Sky Blue
    midnight: "#001F3F"     # Midnight Blue
    navy: "#003D66"         # Deep Navy
    teal: "#00D9A5"         # Success Teal
    ice: "#E6F5FF"          # Ice Blue
    accent: "#FF6B35"       # Tech Orange

  robo_university:    # education sub-brand (Pantone 368 C)
    primary: "#6EC207"      # Primary Green
    lime: "#A8E600"         # Fresh Lime
    sage: "#8FB569"         # Sage
    forest_dark: "#1A3D02"  # Forest Dark
    forest_deep: "#3A6104"  # Deep Forest
    gold: "#FFB800"         # Achievement Gold
    mint: "#F0FFDE"         # Mint Cream
    accent: "#9B59B6"       # Energy Purple

  co_op_lab:          # community sub-brand (Pantone 1788 C)
    primary: "#FF3F33"      # Primary Red
    coral: "#FF6B63"        # Coral Energy
    salmon: "#FF8A80"       # Salmon
    burgundy: "#4D0D0A"     # Burgundy Dark
    crimson: "#B32D25"      # Deep Crimson
    blush: "#FFF0EF"        # Blush
    cyan: "#0EA5E9"         # Community Cyan
    purple: "#A855F7"       # Creative Purple

# Typography (all brands)
font:
  family: "Roboto"
  header_weight: 700        # Bold; 900 (Black) also approved
  body_weight: 400

# Color usage rule (60-30-10)
color_ratio:
  neutral: 60               # white / gray / dark background
  primary: 30               # brand primary color (structure)
  accent: 10                # CTAs / highlights

# --- AI / model defaults ---
model:
  primary: claude-opus-4-7      # coding work
  fallback: claude-sonnet-4-6   # general-purpose
  fast: claude-haiku-4-5-20251001

# --- Companion plugin recommendations by role ---
companion_presets:
  dev:
    - anthropic-skills:pptx
    - anthropic-skills:docx
    - codex
  pm:
    - product-management
    - design
  sales:
    - sales
    - brand-voice
  design:
    - design
    - brand-voice
